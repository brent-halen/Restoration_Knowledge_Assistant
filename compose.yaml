services:
  restoration-assistant:
    build:
      context: .
    container_name: restoration-knowledge-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      CHROMA_PERSIST_DIR: /app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped

volumes:
  chroma_data:

